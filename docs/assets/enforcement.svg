 text-anchor="middle">single Rust binary, in-line</text><rect x="270" y="268" width="428" height="112" rx="12" ry="12" fill="#1b2331" stroke="#222b38" stroke-width="1" filter="url(#soft)"/><rect x="270" y="268" width="6" height="112" rx="3" ry="3" fill="#e3b341" stroke="#283341" stroke-width="1"/><text x="292" y="296" font-size="16" fill="#e6edf3" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="700" text-anchor="start">Budget check</text><text x="684" y="296" font-size="10" fill="#e3b341" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="700" text-anchor="end" letter-spacing="1.5">GATE</text><line x1="292" y1="312" x2="684" y2="312" stroke="#222b38" stroke-width="1"/><text x="292" y="334" font-size="12.5" fill="#e6edf3" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="600" text-anchor="start">estimate cost vs. run budget (hierarchical)</text><text x="292" y="356" font-size="11.5" fill="#ff6b63" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="500" text-anchor="start">over budget → HTTP 402 budget_exceeded</text><rect x="270" y="400" width="428" height="112" rx="12" ry="12" fill="#1b2331" stroke="#222b38" stroke-width="1" filter="url(#soft)"/><rect x="270" y="400" width="6" height="112" rx="3" ry="3" fill="#e3b341" stroke="#283341" stroke-width="1"/><text x="292" y="428" font-size="16" fill="#e6edf3" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="700" text-anchor="start">Loop detector</text><text x="684" y="428" font-size="10" fill="#e3b341" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="700" text-anchor="end" letter-spacing="1.5">GATE</text><line x1="292" y1="444" x2="684" y2="444" stroke="#222b38" stroke-width="1"/><text x="292" y="466" font-size="12.5" fill="#e6edf3" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="600" text-anchor="start">identical-call · ping-pong · context growth</text><text x="292" y="488" font-size="11.5" fill="#ff6b63" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="500" text-anchor="start">loop found → HTTP 402 loop_detected</text><rect x="270" y="532" width="428" height="112" rx="12" ry="12" fill="#1b2331" stroke="#222b38" stroke-width="1" filter="url(#soft)"/><rect x="270" y="532" width="6" height="112" rx="3" ry="3" fill="#e3b341" stroke="#283341" stroke-width="1"/><text x="292" y="560" font-size="16" fill="#e6edf3" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="700" text-anchor="start">Agent firewall (taint / DLP)</text><text x="684" y="560" font-size="10" fill="#e3b341" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="700" text-anchor="end" letter-spacing="1.5">GATE</text><line x1="292" y1="576" x2="684" y2="576" stroke="#222b38" stroke-width="1"/><text x="292" y="598" font-size="12.5" fill="#e6edf3" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="600" text-anchor="start">taint tracking + secret redaction</text><text x="292" y="620" font-size="11.5" fill="#ff6b63" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="500" text-anchor="start">blocked → HTTP 403 taint_dlp_blocked</text><line x1="214" y1="220" x2="365" y2="205" stroke="#2dd4bf" stroke-width="1.8" opacity="1.0"/><path d="M 365 200 L 374 205 L 365 210 Z" fill="#2dd4bf" opacity="1.0"/><text x="294.0" y="212" font-size="11" fill="#2dd4bf" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="600" text-anchor="middle" opacity="1.0">LLM call</text><line x1="484.0"