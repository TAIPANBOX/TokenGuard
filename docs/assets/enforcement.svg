ono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="400" text-anchor="middle">on allow</text><rect x="998" y="200" width="226" height="100" rx="12" ry="12" fill="#1b2331" stroke="#222b38" stroke-width="1" filter="url(#soft)"/><rect x="998" y="200" width="6" height="100" rx="3" ry="3" fill="#4493f8" stroke="#283341" stroke-width="1"/><text x="1020" y="228" font-size="16" fill="#e6edf3" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="700" text-anchor="start">LLM provider</text><line x1="1020" y1="244" x2="1210" y2="244" stroke="#222b38" stroke-width="1"/><text x="1020" y="266" font-size="12.5" fill="#e6edf3" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="600" text-anchor="start">Anthropic · OpenAI-shaped</text><text x="1020" y="288" font-size="11.5" fill="#9aa7b8" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="500" text-anchor="start">incl. Ollama / vLLM</text><rect x="998" y="340" width="226" height="110" rx="12" ry="12" fill="#1b2331" stroke="#222b38" stroke-width="1" filter="url(#soft)"/><rect x="998" y="340" width="6" height="110" rx="3" ry="3" fill="#2dd4bf" stroke="#283341" stroke-width="1"/><text x="1020" y="368" font-size="16" fill="#e6edf3" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="700" text-anchor="start">TokenFuse Cloud</text><line x1="1020" y1="384" x2="1210" y2="384" stroke="#222b38" stroke-width="1"/><text x="1020" y="406" font-size="12.5" fill="#e6edf3" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="600" text-anchor="start">control plane</text><text x="1020" y="428" font-size="11.5" fill="#9aa7b8" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="500" text-anchor="start">CallRecords · incidents</text><rect x="998" y="490" width="226" height="100" rx="12" ry="12" fill="#1b2331" stroke="#222b38" stroke-width="1" filter="url(#soft)"/><rect x="998" y="490" width="6" height="100" rx="3" ry="3" fill="#69788b" stroke="#283341" stroke-width="1"/><text x="1020" y="518" font-size="16" fill="#e6edf3" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="700" text-anchor="start">Fail-open</text><line x1="1020" y1="534" x2="1210" y2="534" stroke="#222b38" stroke-width="1"/><text x="1020" y="556" font-size="12.5" fill="#e6edf3" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="600" text-anchor="start">on gateway trouble</text><text x="1020" y="578" font-size="11.5" fill="#9aa7b8" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="500" text-anchor="start">traffic keeps flowing</text><path d="M 658 644 C 658 630, 900 630, 998 395" fill="none" stroke="#2dd4bf" stroke-width="1.8" opacity="0.55" stroke-dasharray="5,4"/><g transform="translate(998,395) rotate(-60)"><path d="M -9 -5 L 0 0 L -9 5 Z" fill="#2dd4bf" opacity="0.55"/></g><text x="770" y="630" font-size="11" fill="#2dd4bf" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="400" text-anchor="start">CallRecords</text></svg>